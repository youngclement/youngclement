<svg width="1000" height="200" viewBox="0 0 1000 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#A0A0A0" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>

    <filter id="premium-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      .white-line {
        stroke-dasharray: 300;
        stroke-dashoffset: 300;
        animation: draw-slow 10s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        stroke: url(#textGradient);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      @keyframes draw-slow {
        0%, 10% { stroke-dashoffset: 300; opacity: 0; }
        40%, 90% { stroke-dashoffset: 0; opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 1; }
      }

      .white-line:nth-child(1) { animation-delay: 0.0s; }
      .white-line:nth-child(2) { animation-delay: 0.3s; }
      .white-line:nth-child(3) { animation-delay: 0.6s; }
      .white-line:nth-child(4) { animation-delay: 0.9s; }
      .white-line:nth-child(5) { animation-delay: 1.2s; }
      .white-line:nth-child(6) { animation-delay: 1.5s; }
      .white-line:nth-child(7) { animation-delay: 1.8s; }
      .white-line:nth-child(8) { animation-delay: 2.1s; }
      .white-line:nth-child(9) { animation-delay: 2.4s; }
      .white-line:nth-child(10) { animation-delay: 2.7s; }
      .white-line:nth-child(11) { animation-delay: 3.0s; }
      .white-line:nth-child(12) { animation-delay: 3.3s; }

      #main-group {
        filter: url(#premium-glow);
      }
    </style>
  </defs>

  <rect width="1000" height="200" fill="transparent" />

  <g id="main-group" transform="translate(40, 40) scale(0.95)">
    <path class="white-line" d="M80,60 Q50,60 50,90 Q50,120 80,120" /> 
    <path class="white-line" d="M110,60 V120 H140" /> 
    <path class="white-line" d="M170,120 V60 H200 M170,90 H195 M170,120 H200" /> 
    <path class="white-line" d="M230,120 V60 L260,100 L290,60 V120" /> 
    <path class="white-line" d="M320,120 V60 H350 M320,90 H345 M320,120 H350" /> 
    <path class="white-line" d="M380,120 V60 L420,120 V60" /> 
    <path class="white-line" d="M450,60 H500 M475,60 V120" /> 
    <path class="white-line" d="M560,60 V120 M560,90 H600 M600,60 V120" /> 
    <path class="white-line" d="M670,120 Q640,120 640,90 Q640,60 670,60 Q700,60 700,90 Q700,120 670,120 Z" /> 
    <path class="white-line" d="M740,120 L765,60 L790,120 M750,100 H780" /> 
    <path class="white-line" d="M820,120 V60 L860,120 V60" /> 
    <path class="white-line" d="M930,90 Q930,60 900,60 Q870,60 870,90 Q870,120 900,120 H930 V85 H910" /> 
  </g>
</svg>
