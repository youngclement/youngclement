<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M120,80 Q100,60 70,60 Q40,60 40,100 Q40,140 75,140 Q100,140 115,120">
      <animate attributeName="stroke-dasharray" from="0, 300" to="300, 0" dur="1.5s" begin="0s" fill="freeze" />
    </path>
    <path d="M140,40 V140 Q140,150 160,140">
      <animate attributeName="stroke-dasharray" from="0, 200" to="200, 0" dur="1s" begin="0.8s" fill="freeze" />
    </path>
    <path d="M230,100 H190 Q190,70 215,70 Q240,70 240,100 Q240,130 215,130 Q190,130 185,115">
      <animate attributeName="stroke-dasharray" from="0, 250" to="250, 0" dur="1s" begin="1.3s" fill="freeze" />
    </path>
    <path d="M270,140 V80 Q270,60 295,60 Q320,60 320,90 V140 M320,90 Q320,60 345,60 Q370,60 370,90 V140">
      <animate attributeName="stroke-dasharray" from="0, 500" to="500, 0" dur="2s" begin="1.8s" fill="freeze" />
    </path>
    <path d="M430,100 H390 Q390,70 415,70 Q440,70 440,100 Q440,130 415,130 Q390,130 385,115">
      <animate attributeName="stroke-dasharray" from="0, 250" to="250, 0" dur="1s" begin="2.8s" fill="freeze" />
    </path>
    <path d="M470,140 V80 Q470,60 500,60 Q530,60 530,90 V140">
      <animate attributeName="stroke-dasharray" from="0, 300" to="300, 0" dur="1.2s" begin="3.3s" fill="freeze" />
    </path>
    <path d="M580,45 V140 M560,80 H600">
      <animate attributeName="stroke-dasharray" from="0, 200" to="200, 0" dur="1s" begin="3.8s" fill="freeze" />
    </path>
  </g>
</svg>
