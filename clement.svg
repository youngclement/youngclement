<svg id="svg-stage" xmlns="http://www.w3.org/2000/svg" viewBox="40 50 920 80" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="white-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .white-line {
        stroke-dasharray: 250; 
        stroke-dashoffset: 250;
        /* Tăng thời gian lên 8s để cực kỳ chậm rãi */
        animation: draw-slow 8s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        fill: none;
        stroke: #ffffff;
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      @keyframes draw-slow {
        0%, 15% { stroke-dashoffset: 250; opacity: 0; }
        40%, 85% { stroke-dashoffset: 0; opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 1; }
      }

      #text-group-white {
        filter: url(#white-glow);
        /* Hiệu ứng nhịp thở chậm */
        animation: breathe-slow 8s ease-in-out infinite alternate;
      }

      @keyframes breathe-slow {
        0%, 30% { opacity: 0.5; filter: drop-shadow(0 0 2px white); }
        80%, 100% { opacity: 1; filter: drop-shadow(0 0 12px white); }
      }

      /* Tăng độ trễ (delay) giữa các nét để tạo nhịp điệu thong thả */
      .white-line:nth-child(1) { animation-delay: 0.0s; }
      .white-line:nth-child(2) { animation-delay: 0.4s; }
      .white-line:nth-child(3) { animation-delay: 0.8s; }
      .white-line:nth-child(4) { animation-delay: 1.2s; }
      .white-line:nth-child(5) { animation-delay: 1.6s; }
      .white-line:nth-child(6) { animation-delay: 2.0s; }
      .white-line:nth-child(7) { animation-delay: 2.4s; }
      .white-line:nth-child(8) { animation-delay: 2.8s; }
      .white-line:nth-child(9) { animation-delay: 3.2s; }
      .white-line:nth-child(10) { animation-delay: 3.6s; }
      .white-line:nth-child(11) { animation-delay: 4.0s; }
      .white-line:nth-child(12) { animation-delay: 4.4s; }
    </style>
  </defs>

  <rect width="1000" height="200" x="0" y="0" fill="black" />

  <g id="text-group-white">
    <path class="letter white-line" d="M80,60 Q50,60 50,90 Q50,120 80,120" /> 
    <path class="letter white-line" d="M110,60 V120 H140" /> 
    <path class="letter white-line" d="M170,120 V60 H200 M170,90 H195 M170,120 H200" /> 
    <path class="letter white-line" d="M230,120 V60 L260,100 L290,60 V120" /> 
    <path class="letter white-line" d="M320,120 V60 H350 M320,90 H345 M320,120 H350" /> 
    <path class="letter white-line" d="M380,120 V60 L420,120 V60" /> 
    <path class="letter white-line" d="M450,60 H500 M475,60 V120" /> 
    <path class="letter white-line" d="M560,60 V120 M560,90 H600 M600,60 V120" /> 
    <path class="letter white-line" d="M670,120 Q640,120 640,90 Q640,60 670,60 Q700,60 700,90 Q700,120 670,120 Z" /> 
    <path class="letter white-line" d="M740,120 L765,60 L790,120 M750,100 H780" /> 
    <path class="letter white-line" d="M820,120 V60 L860,120 V60" /> 
    <path class="letter white-line" d="M930,90 Q930,60 900,60 Q870,60 870,90 Q870,120 900,120 H930 V85 H910" /> 
  </g>
</svg>
